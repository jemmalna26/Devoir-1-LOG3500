<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Signup Page</title>

</head>

<body>
    <div class="container">
        <div class="form-section">
            <h1>Ready to start your story?</h1>
            <p>Signup to our website and start leafing through your favorite literature today!</p>
            
            <form>
                <input type="text" placeholder="Jane Doe" name="fullname">
                <input type="email" placeholder="janedoe@mail.com" name="email">
                <input type="text" placeholder="Area of interest" name="interest">
                
                <label>
                    <input type="checkbox" name="terms">
                    I agree to the <a href="#">Terms & Conditions</a>
                </label>
                
                <button type="submit">Sign up</button>
            </form>
        </div>
        
        <div class="image-section">
            <img src="images/book.png" alt="Illustration">
        </div>
    </div>
</body>
</html>
